name: Deploy to Production
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.IP }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            APP_DIR=/var/www/financemanager
            VENV_PYTHON="$APP_DIR/venv/bin/python"

            # 1. Write .env from secrets
            cat > "$APP_DIR/.env" << 'ENVEOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GEMINI_MODEL=gemini-2.5-pro
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            TOKEN_EXPIRE_HOURS=24
            DASHBOARD_USERNAME=${{ secrets.DASHBOARD_USERNAME }}
            DASHBOARD_PASSWORD_HASH=${{ secrets.DASHBOARD_PASSWORD_HASH }}
            ENVEOF

            # 2. Update Code
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            # 3. Install Backend Dependencies
            # We use 'python -m pip' to ensure we hit the venv and avoid path conflicts
            "$VENV_PYTHON" -m pip install -U pip
            "$VENV_PYTHON" -m pip install -r backend/requirements.txt

            # 4. Database Migrations
            # Using 'python -m alembic' prevents the 'ModuleNotFoundError'
            cd "$APP_DIR/backend"
            "$VENV_PYTHON" -m alembic upgrade head

            # 5. Frontend Build
            cd "$APP_DIR/frontend"
            npm ci --silent
            npm run build

            # 6. Restart Service
            sudo systemctl restart financemanager
            sudo systemctl is-active --quiet financemanager || (journalctl -u financemanager -n 30 && exit 1)

            echo "Deploy complete at $(date)"
