name: Deploy to Production
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload code
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.IP }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          source: "."
          target: "/var/www/financemanager"
          exclude: ".git,__pycache__,*.pyc,.env,venv,node_modules"
          overwrite: true

      - name: Deploy & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.IP }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          envs: DATABASE_URL,TELEGRAM_BOT_TOKEN,GEMINI_API_KEY,CORS_ORIGINS,SECRET_KEY,DASHBOARD_USERNAME,DASHBOARD_PASSWORD_HASH
          script: |
            set -e
            APP_DIR=/var/www/financemanager
            VENV_PYTHON="$APP_DIR/venv/bin/python"

            # 1. Write .env
            printf '%s\n' \
              "DATABASE_URL=$DATABASE_URL" \
              "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" \
              "GEMINI_API_KEY=$GEMINI_API_KEY" \
              "GEMINI_MODEL=gemini-2.5-pro" \
              "CORS_ORIGINS=$CORS_ORIGINS" \
              "SECRET_KEY=$SECRET_KEY" \
              "TOKEN_EXPIRE_HOURS=24" \
              "DASHBOARD_USERNAME=$DASHBOARD_USERNAME" \
              "DASHBOARD_PASSWORD_HASH=$DASHBOARD_PASSWORD_HASH" \
              > "$APP_DIR/.env"

            # 2. Install backend dependencies
            "$VENV_PYTHON" -m pip install -U pip
            "$VENV_PYTHON" -m pip install -r "$APP_DIR/backend/requirements.txt"

            # 3. Database migrations
            cd "$APP_DIR/backend"
            "$VENV_PYTHON" -m alembic upgrade head

            # 4. Frontend build
            cd "$APP_DIR/frontend"
            npm ci --silent
            npm run build --  --skipLibCheck || npx tsc --skipLibCheck && npx vite build

            # 5. Restart service
            sudo systemctl restart financemanager
            sudo systemctl is-active --quiet financemanager || (journalctl -u financemanager -n 30 && exit 1)

            echo "Deploy complete at $(date)"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DASHBOARD_USERNAME: ${{ secrets.DASHBOARD_USERNAME }}
          DASHBOARD_PASSWORD_HASH: ${{ secrets.DASHBOARD_PASSWORD_HASH }}
